<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Destinations | WanderLuxe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: { 50: '#f4f6f8', 900: '#1a202c', gold: '#c5a059', dark: '#0f172a' }
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'], serif: ['Playfair Display', 'serif'] }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="font-sans text-gray-800 bg-brand-50 transition-colors duration-300 dark:bg-brand-dark dark:text-gray-200">

    <!-- Navbar (Solid Background) -->
    <nav class="w-full z-40 bg-white dark:bg-brand-dark shadow-md py-4 px-6 md:px-12 sticky top-0">
        <div class="container mx-auto flex justify-between items-center">
            <a href="../index.html" class="text-2xl font-serif font-bold text-brand-900 dark:text-white tracking-wider flex items-center gap-2">
                <i class="fa-solid fa-compass text-brand-gold"></i> WanderLuxe
            </a>
            
            <div class="hidden md:flex space-x-8 items-center">
                <a href="../index.html" class="text-gray-800 dark:text-white hover:text-brand-gold transition text-sm uppercase tracking-wide">Home</a>
                <a href="destinations.html" class="text-brand-gold font-semibold transition text-sm uppercase tracking-wide">Destinations</a>
                <a href="packages.html" class="text-gray-800 dark:text-white hover:text-brand-gold transition text-sm uppercase tracking-wide">Packages</a>
                <a href="contact.html" class="text-gray-800 dark:text-white hover:text-brand-gold transition text-sm uppercase tracking-wide">Contact</a>
                <button id="theme-toggle" class="text-gray-800 dark:text-white hover:text-brand-gold transition">
                    <i class="fa-solid fa-moon"></i>
                </button>
            </div>
            
            <!-- Mobile Menu Button -->
            <button id="mobile-menu-btn" class="md:hidden text-gray-800 dark:text-white text-2xl focus:outline-none">
                <i class="fa-solid fa-bars"></i>
            </button>
        </div>
    </nav>

    <!-- Page Header -->
    <section class="py-20 bg-brand-900 text-center relative overflow-hidden">
        <div class="absolute inset-0 z-0 opacity-40">
            <img src="https://images.unsplash.com/photo-1454391304352-2bf4678b1a7a?q=80&w=2000&auto=format&fit=crop" class="w-full h-full object-cover">
        </div>
        <div class="relative z-10 container mx-auto px-4" data-aos="fade-up">
            <h1 class="text-5xl md:text-6xl font-serif font-bold text-white mb-4">Explore the World</h1>
            <p class="text-gray-300 text-lg max-w-2xl mx-auto font-light">Discover our handpicked destinations for your next unforgettable journey.</p>
        </div>
    </section>

    <!-- Destinations Grid -->
    <section class="py-20">
        <div class="container mx-auto px-4 md:px-12">
            <div class="flex flex-col md:flex-row justify-between items-center mb-12">
                <h2 class="text-3xl font-serif font-bold text-brand-900 dark:text-white mb-6 md:mb-0">All Destinations</h2>
                <div class="flex gap-4">
                    <select class="bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-700 text-gray-800 dark:text-white rounded-lg px-4 py-2 focus:outline-none focus:border-brand-gold">
                        <option>All Regions</option>
                        <option>Europe</option>
                        <option>Asia</option>
                        <option>Americas</option>
                    </select>
                </div>
            </div>

            <div id="destinations-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                <!-- Destinations will be loaded here via JS -->
                <div class="col-span-full text-center py-10">
                    <div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-brand-gold"></div>
                    <p class="mt-4 text-gray-500">Loading destinations...</p>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer (Simplified) -->
    <footer class="bg-brand-900 text-white py-10 border-t border-white/10 text-center">
        <p>&copy; 2026 WanderLuxe Travel Agency. All rights reserved.</p>
    </footer>

    <!-- Scripts -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="../js/main.js"></script>
    <script src="../js/api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            AOS.init();
            
            const container = document.getElementById('destinations-container');
            
            try {
                const res = await fetch('http://localhost:5000/api/destinations');
                const data = await res.json();
                
                if (data.success && data.data.length > 0) {
                    renderDestinations(data.data);
                } else {
                    useMockData();
                }
            } catch (error) {
                console.error('Error fetching destinations:', error);
                console.log('Falling back to mock data for preview purposes.');
                useMockData();
            }

            function useMockData() {
                const mockDestinations = [
                    { name: 'Paris', country: 'France', description: 'Experience the city of love, fashion, and art with our exclusive guided tours.', image: 'https://images.unsplash.com/photo-1499856871958-5b9627545d1a?q=80&w=1000' },
                    { name: 'Dubai', country: 'UAE', description: 'Discover modern luxury, towering skyscrapers, and golden desert dunes.', image: 'https://images.unsplash.com/photo-1512453979798-5ea266f8880c?q=80&w=1000' },
                    { name: 'Maldives', country: 'Asia', description: 'Relax in paradise with crystal clear waters and private overwater bungalows.', image: 'https://images.unsplash.com/photo-1540206351-d6465b3ac5c1?q=80&w=1000' },
                    { name: 'Tokyo', country: 'Japan', description: 'Explore the vibrant blend of traditional culture and futuristic city life.', image: 'https://images.unsplash.com/photo-1503899036084-c55cdd92da26?q=80&w=1000' },
                    { name: 'Rome', country: 'Italy', description: 'Step back into history and explore ancient ruins and world-class cuisine.', image: 'https://images.unsplash.com/photo-1552832230-c0197dd311b5?q=80&w=1000' },
                    { name: 'Santorini', country: 'Greece', description: 'Enjoy breathtaking sunsets and iconic white-washed architecture.', image: 'https://images.unsplash.com/photo-1613395877344-13d4a8e0d49e?q=80&w=1000' }
                ];
                renderDestinations(mockDestinations);
            }

            function renderDestinations(destinations) {
                container.innerHTML = '';
                destinations.forEach((dest, index) => {
                    const delay = (index % 3) * 100;
                    const card = `
                        <div class="group relative overflow-hidden rounded-2xl shadow-xl cursor-pointer" data-aos="fade-up" data-aos-delay="${delay}">
                            <div class="aspect-w-4 aspect-h-5 w-full h-[400px]">
                                <img src="${dest.image.startsWith('http') ? dest.image : 'https://images.unsplash.com/photo-1469854523086-cc02fe5d8800?q=80&w=1000'}" alt="${dest.name}" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110">
                            </div>
                            <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-black/40 to-transparent flex flex-col justify-end p-6">
                                <span class="bg-brand-gold text-white text-xs uppercase px-3 py-1 rounded-full w-max mb-3 tracking-wider">${dest.country}</span>
                                <h3 class="text-3xl font-serif text-white mb-2">${dest.name}</h3>
                                <p class="text-gray-300 text-sm line-clamp-2 transform translate-y-8 opacity-0 group-hover:translate-y-0 group-hover:opacity-100 transition-all duration-300">${dest.description}</p>
                            </div>
                        </div>
                    `;
                    container.innerHTML += card;
                });
            }
        });
    </script>
</body>
</html>
