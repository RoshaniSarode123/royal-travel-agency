<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | WanderLuxe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: { 50: '#f4f6f8', 900: '#1a202c', gold: '#c5a059', dark: '#0f172a' }
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'], serif: ['Playfair Display', 'serif'] }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="font-sans text-gray-800 bg-brand-50 dark:bg-brand-dark dark:text-gray-200 min-h-screen flex items-center justify-center relative">
    
    <!-- Background Image -->
    <div class="absolute inset-0 z-0">
        <img src="https://images.unsplash.com/photo-1476514525535-07fb3b4ae5f1?q=80&w=2000&auto=format&fit=crop" class="w-full h-full object-cover filter brightness-50">
    </div>

    <!-- Login Form -->
    <div class="relative z-10 w-full max-w-md p-8 bg-white/90 dark:bg-brand-dark/90 backdrop-blur-lg rounded-2xl shadow-2xl mx-4">
        <div class="text-center mb-8">
            <a href="../index.html" class="text-2xl font-serif font-bold text-brand-900 dark:text-white tracking-wider flex items-center justify-center gap-2 mb-2">
                <i class="fa-solid fa-compass text-brand-gold"></i> WanderLuxe
            </a>
            <p class="text-gray-500 dark:text-gray-400">Sign in to your account</p>
        </div>

        <form id="login-form" class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Email Address</label>
                <div class="relative">
                    <i class="fa-regular fa-envelope absolute left-3 top-3 text-gray-400"></i>
                    <input type="email" id="email" required class="w-full pl-10 pr-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-brand-gold focus:border-brand-gold bg-transparent dark:text-white">
                </div>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Password</label>
                <div class="relative">
                    <i class="fa-solid fa-lock absolute left-3 top-3 text-gray-400"></i>
                    <input type="password" id="password" required class="w-full pl-10 pr-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-brand-gold focus:border-brand-gold bg-transparent dark:text-white">
                </div>
            </div>
            
            <div class="flex items-center justify-between">
                <div class="flex items-center">
                    <input type="checkbox" id="remember" class="h-4 w-4 text-brand-gold focus:ring-brand-gold border-gray-300 rounded">
                    <label for="remember" class="ml-2 block text-sm text-gray-700 dark:text-gray-300">Remember me</label>
                </div>
                <div class="text-sm">
                    <a href="#" class="text-brand-gold hover:underline">Forgot password?</a>
                </div>
            </div>

            <button type="submit" class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-brand-gold hover:bg-yellow-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand-gold transition uppercase tracking-widest">
                Sign In
            </button>
        </form>

        <p class="mt-8 text-center text-sm text-gray-600 dark:text-gray-400">
            Don't have an account? <a href="register.html" class="font-medium text-brand-gold hover:underline">Sign up</a>
        </p>
    </div>

    <!-- API Logic -->
    <script src="../js/api.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const res = await fetch('http://localhost:5000/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await res.json();
                
                if (data.success) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data));
                    if (data.role === 'admin') {
                        window.location.href = 'admin-dashboard.html';
                    } else {
                        window.location.href = '../index.html';
                    }
                } else {
                    alert(data.message || 'Login failed');
                }
            } catch (error) {
                console.error(error);
                console.log('Backend not available. Using mock admin login for preview.');
                localStorage.setItem('token', 'mock-token-123');
                localStorage.setItem('user', JSON.stringify({ name: 'Admin Preview', role: 'admin', email: email }));
                alert('Preview Mode: Logged in as Admin');
                window.location.href = 'admin-dashboard.html';
            }
        });
    </script>
</body>
</html>
